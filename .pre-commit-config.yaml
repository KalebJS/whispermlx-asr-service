# Pre-commit config for prek (and pre-commit compatible runners)
# Install: pip install prek  OR  pip install pre-commit
# Run:     prek run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "app/"]
        additional_dependencies: ["bandit[toml]"]
